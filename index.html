<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>가젯연구소 · 가성비 IT/가전/가젯 큐레이션</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Pretendard","Apple SD Gothic Neo","Segoe UI",system-ui,sans-serif;
       background:radial-gradient(900px 500px at 50% -5%,#16203a,#0a0e1a 60%);color:#eaf0fb;
       min-height:100vh;padding:28px 18px 60px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:480px;margin:0 auto}
  .head{text-align:center;margin-bottom:26px}
  .logo{width:74px;height:74px;border-radius:20px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;
        font-size:38px;background:linear-gradient(145deg,#1d2945,#121a30);border:2px solid #ffd479;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  .name{font-size:22px;font-weight:800}
  .name b{color:#ffd479}
  .desc{font-size:13.5px;color:#9fb0d0;margin-top:6px;line-height:1.5}
  .tag{display:inline-block;margin-top:10px;font-size:11.5px;color:#7fe0c0;background:rgba(50,200,160,.12);
       border:1px solid rgba(80,220,180,.3);padding:4px 11px;border-radius:999px}
  .sec{font-size:12px;color:#7f8db0;letter-spacing:.5px;margin:24px 4px 12px;font-weight:600}
  .card{display:flex;align-items:center;gap:13px;text-decoration:none;color:inherit;
        background:linear-gradient(145deg,#141d33,#101729);border:1px solid #25324f;border-radius:16px;
        padding:12px;margin-bottom:13px;transition:transform .15s,border-color .15s}
  .card:active{transform:scale(.98)}
  .card:hover{border-color:#3a4a72}
  .thumb{width:72px;height:72px;border-radius:12px;object-fit:cover;background:#0c1426;flex:none}
  .ci{flex:1;min-width:0}
  .ct{font-size:15px;font-weight:700;line-height:1.3}
  .cs{font-size:12.5px;color:#9fb0d0;margin-top:4px}
  .cprice{font-size:13px;color:#ffd479;font-weight:700;margin-top:5px}
  .go{flex:none;font-size:12.5px;font-weight:700;color:#06203f;background:#ffd479;
      padding:9px 13px;border-radius:10px;white-space:nowrap}
  .disc{margin-top:28px;font-size:11px;color:#6b7799;line-height:1.6;text-align:center;
        border-top:1px solid #1c2640;padding-top:18px}
  .sns{text-align:center;margin-top:16px;font-size:12.5px}
  .sns a{color:#9fb0d0;text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="logo">🔬</div>
    <div class="name">가젯연구소 <b>GADGET LAB</b></div>
    <div class="desc">직접 써보고 고른 가성비 IT·가전·가젯<br>솔직 후기 큐레이션</div>
    <div class="tag">⌨ 오늘의 추천템</div>
  </div>

  <div class="sec">🔥 추천 제품</div>

  <!-- 제품 카드: 새 제품은 이 블록을 복사해서 추가 -->
  <a class="card" href="https://coupa.ng/cnhpyH" target="_blank" rel="noopener">
    <img class="thumb" src="aula.png" alt="독거미 AULA F87 Pro"/>
    <div class="ci">
      <div class="ct">독거미 AULA F87 Pro</div>
      <div class="cs">무선 기계식 · 87키 · 공장윤활 · 저소음</div>
      <div class="cprice">3~4만원대</div>
    </div>
    <div class="go">쿠팡 →</div>
  </a>
  <!-- /제품 카드 -->

  <div class="disc">
    이 페이지의 링크는 쿠팡 파트너스 활동의 일환으로,<br>
    이에 따른 일정액의 수수료를 제공받습니다.
  </div>
  <div class="sns"><a href="https://instagram.com/gajesyeonguso" target="_blank">@gajesyeonguso</a></div>
</div>
</body>
</html>
